<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<title>Wipidea</title>
<meta name="description" content="Funil visual para capturar, resfriar, avaliar e executar ideias." />
<meta name="theme-color" content="#000000" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Wipidea" />
<style>
  /* ============ Design tokens (Apple-inspired, monochromático + 1 acento) ============ */
  :root[data-theme="dark"]{
    --bg:#000000; --bg-2:#0b0b0d;
    --surface:#1c1c1e; --surface-2:#2c2c2e; --surface-3:#3a3a3c;
    --text:#f5f5f7; --muted:#98989f; --faint:#636366;
    --border:rgba(255,255,255,.09); --border-2:rgba(255,255,255,.14);
    --accent:#0a84ff; --accent-soft:rgba(10,132,255,.16);
    --good:#30d158; --mid:#ffd60a; --bad:#ff453a;
    --shadow:0 12px 40px rgba(0,0,0,.6);
    --glass:rgba(20,20,22,.72);
  }
  :root[data-theme="light"]{
    --bg:#f2f2f7; --bg-2:#e9e9ef;
    --surface:#ffffff; --surface-2:#f5f5f7; --surface-3:#ececf0;
    --text:#1d1d1f; --muted:#6e6e73; --faint:#aeaeb2;
    --border:rgba(0,0,0,.08); --border-2:rgba(0,0,0,.14);
    --accent:#007aff; --accent-soft:rgba(0,122,255,.12);
    --good:#28c840; --mid:#e6b400; --bad:#ff3b30;
    --shadow:0 12px 40px rgba(0,0,0,.14);
    --glass:rgba(255,255,255,.72);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    margin:0; background:radial-gradient(120% 100% at 50% 0%, var(--bg-2), var(--bg));
    color:var(--text); font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI Variable","Segoe UI",system-ui,sans-serif;
    -webkit-font-smoothing:antialiased; overflow:hidden; letter-spacing:-.01em;
  }
  button{font-family:inherit;cursor:pointer;color:inherit;border:none;background:none}
  input,textarea{font-family:inherit;color:inherit}
  ::selection{background:var(--accent-soft)}

  /* ============ Header ============ */
  header.top{
    position:sticky;top:0;z-index:50; display:flex;align-items:center;gap:14px;
    padding:14px 22px; background:var(--glass); backdrop-filter:saturate(180%) blur(20px);
    -webkit-backdrop-filter:saturate(180%) blur(20px); border-bottom:1px solid var(--border);
  }
  .brand{display:flex;align-items:center;gap:10px;font-weight:600;font-size:17px}
  .brand svg{display:block}
  .brand .dot{color:var(--accent)}
  .spacer{flex:1}
  .search{
    display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);
    padding:7px 12px;border-radius:10px;min-width:200px;transition:border-color .2s,box-shadow .2s
  }
  .search:focus-within{border-color:var(--accent);box-shadow:0 0 0 4px var(--accent-soft)}
  .search input{border:none;background:none;outline:none;width:100%;font-size:13.5px}
  .search svg{color:var(--muted);flex:none}
  .icon-btn{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;
    background:var(--surface);border:1px solid var(--border);transition:.18s}
  .icon-btn:hover{background:var(--surface-2);border-color:var(--border-2)}
  .new-btn{
    display:flex;align-items:center;gap:8px;background:var(--accent);color:#fff;font-weight:600;
    font-size:13.5px;padding:9px 16px;border-radius:10px;transition:transform .12s,filter .2s;
    box-shadow:0 4px 14px var(--accent-soft)
  }
  .new-btn:hover{filter:brightness(1.08)} .new-btn:active{transform:scale(.96)}
  .new-btn kbd{font:inherit;font-size:11px;background:rgba(255,255,255,.22);padding:1px 6px;border-radius:5px}

  /* ============ Board ============ */
  .board-wrap{height:calc(100vh - 67px);overflow-x:auto;overflow-y:hidden}
  .board{display:flex;gap:16px;padding:20px 22px 26px;height:100%;min-width:max-content}
  .col{display:flex;flex-direction:column;width:300px;min-width:300px;height:100%}
  .col-head{display:flex;align-items:baseline;gap:8px;padding:2px 6px 12px}
  .col-head h2{margin:0;font-size:14.5px;font-weight:600}
  .col-head .sub{font-size:11.5px;color:var(--faint)}
  .col-head .count{margin-left:auto;font-size:12px;color:var(--muted);background:var(--surface);
    border:1px solid var(--border);min-width:22px;text-align:center;padding:1px 7px;border-radius:20px}
  .col-body{
    flex:1;overflow-y:auto;overflow-x:hidden;padding:6px;border-radius:16px;
    background:linear-gradient(180deg,var(--surface) 0%, color-mix(in srgb,var(--surface) 60%, transparent) 100%);
    border:1px solid var(--border);display:flex;flex-direction:column;gap:10px;scrollbar-width:thin
  }
  .col-body::-webkit-scrollbar{width:8px}
  .col-body::-webkit-scrollbar-thumb{background:var(--surface-3);border-radius:8px}
  .col-body.drop-hot{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft) inset}
  .empty{margin:auto;text-align:center;color:var(--faint);font-size:12.5px;padding:30px 14px;line-height:1.5}

  /* ============ Card ============ */
  .card{
    position:relative;background:var(--surface-2);border:1px solid var(--border);border-radius:14px;
    padding:13px 14px;cursor:grab;transition:box-shadow .2s,transform .12s,border-color .2s,opacity .25s;
    touch-action:none;user-select:none
  }
  .card:hover{border-color:var(--border-2);box-shadow:0 6px 18px rgba(0,0,0,.18)}
  .card:active{cursor:grabbing}
  .card.locked{opacity:.62;cursor:not-allowed}
  .card.locked:hover{box-shadow:none;border-color:var(--border)}
  .card.dragging{box-shadow:var(--shadow);border-color:var(--accent);opacity:1!important;z-index:1000}
  .card-top{display:flex;align-items:flex-start;gap:8px}
  .card h3{margin:0;font-size:14.5px;font-weight:600;line-height:1.32;flex:1;word-break:break-word}
  .card .desc{margin:7px 0 0;font-size:12.5px;color:var(--muted);line-height:1.45;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .card-foot{display:flex;align-items:center;gap:8px;margin-top:11px;font-size:11.5px;color:var(--faint)}
  .chip-mini{margin-left:auto;font-size:11px;font-weight:600;color:var(--accent);
    background:var(--accent-soft);padding:3px 9px;border-radius:7px;transition:.15s}
  .chip-mini:hover{filter:brightness(1.15)}
  .score{flex:none;font-size:12.5px;font-weight:700;padding:3px 9px;border-radius:8px;color:#fff}
  .score.high{background:var(--good)} .score.mid{background:var(--mid);color:#1d1d1f} .score.low{background:var(--bad)}

  /* lock / quarantine footer */
  .lock-wrap{display:flex;align-items:center;gap:9px;margin-top:11px;padding-top:10px;border-top:1px solid var(--border)}
  .lock-txt{display:flex;flex-direction:column;line-height:1.3}
  .lock-txt b{font-size:11.5px;font-weight:600;color:var(--text)}
  .lock-txt span{font-size:10.5px;color:var(--faint)}
  .ready{margin-top:11px;padding-top:10px;border-top:1px solid var(--border);
    font-size:11.5px;font-weight:600;color:var(--good)}
  .ring{flex:none;transform:rotate(-90deg)}
  .ring .ring-bg{fill:none;stroke:var(--surface-3);stroke-width:2.4}
  .ring .ring-fg{fill:none;stroke:var(--accent);stroke-width:2.4;stroke-linecap:round;
    stroke-dasharray:50.27;transition:stroke-dashoffset .4s}

  .placeholder{border:1.5px dashed var(--border-2);border-radius:14px;background:var(--accent-soft);
    opacity:.5;transition:height .15s}

  /* ============ Modals ============ */
  #modalRoot{position:fixed;inset:0;z-index:100;pointer-events:none}
  .overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    background:rgba(0,0,0,.5);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
    opacity:0;transition:opacity .2s;pointer-events:auto;padding:20px}
  .overlay.show{opacity:1}
  .modal{width:100%;max-width:440px;background:var(--surface);border:1px solid var(--border-2);
    border-radius:20px;box-shadow:var(--shadow);padding:22px;transform:scale(.96) translateY(8px);
    transition:transform .22s cubic-bezier(.2,.9,.3,1);max-height:90vh;overflow:auto}
  .overlay.show .modal{transform:none}
  .modal.full{max-width:980px;height:90vh;display:flex;flex-direction:column}
  .modal h2{margin:0 0 2px;font-size:19px} .modal h1{margin:0;font-size:22px}
  .modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
  .modal .icon{width:32px;height:32px;border-radius:9px;display:grid;place-items:center;
    background:var(--surface-2);color:var(--muted);font-size:14px;transition:.15s}
  .modal .icon:hover{background:var(--surface-3);color:var(--text)}
  .muted{color:var(--muted)} .small{font-size:12.5px} .xsmall{font-size:11.5px;line-height:1.5}

  label.fld,.sheet label{display:block;font-size:12.5px;color:var(--muted);margin-top:13px;font-weight:500}
  .modal input[type=text],.modal input:not([type]),.modal textarea,.sheet input,.sheet textarea,.title-input{
    width:100%;margin-top:6px;background:var(--surface-2);border:1px solid var(--border);
    border-radius:11px;padding:11px 13px;font-size:14px;outline:none;transition:border-color .2s,box-shadow .2s;resize:vertical}
  .modal input:focus,.modal textarea:focus,.title-input:focus{border-color:var(--accent);box-shadow:0 0 0 4px var(--accent-soft)}
  .title-input{font-size:18px;font-weight:600;margin-top:4px}
  .row{display:flex;gap:10px;align-items:center} .row.end{justify-content:flex-end;margin-top:20px}
  .primary{background:var(--accent);color:#fff;font-weight:600;font-size:14px;padding:11px 18px;border-radius:11px;transition:.15s}
  .primary:hover{filter:brightness(1.08)} .primary:active{transform:scale(.97)}
  .ghost{background:var(--surface-2);border:1px solid var(--border);font-weight:500;font-size:13.5px;
    padding:10px 16px;border-radius:11px;transition:.15s}
  .ghost:hover{background:var(--surface-3)}
  .ghost.danger{color:var(--bad)} .ghost:disabled{opacity:.4;cursor:not-allowed}

  /* score modal */
  .crit{margin-top:16px}
  .crit-top{display:flex;justify-content:space-between;font-size:13.5px;font-weight:500;margin-bottom:8px}
  .crit-top b{color:var(--accent);font-size:15px}
  .crit small{display:block;margin-top:5px;font-size:11.5px;line-height:1.4}
  input[type=range]{width:100%;-webkit-appearance:none;height:6px;border-radius:6px;
    background:var(--surface-3);outline:none}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;
    background:#fff;border:1px solid var(--border-2);box-shadow:0 2px 6px rgba(0,0,0,.3);cursor:grab}
  input[type=range]::-moz-range-thumb{width:20px;height:20px;border-radius:50%;background:#fff;border:none;cursor:grab}
  .score-preview{display:flex;align-items:center;justify-content:space-between;margin-top:22px;
    padding:14px 16px;background:var(--surface-2);border-radius:14px;font-size:13.5px;font-weight:500}
  .score-big{display:flex;align-items:baseline;gap:7px;padding:8px 14px;border-radius:12px;color:#fff}
  .score-big strong{font-size:24px} .score-big span{font-size:12px;opacity:.92}
  .score-big.high{background:var(--good)} .score-big.mid{background:var(--mid);color:#1d1d1f} .score-big.low{background:var(--bad)}

  /* detail */
  .stage-tag{font-size:12px;font-weight:600;color:var(--accent);background:var(--accent-soft);padding:4px 11px;border-radius:8px}
  .score-row{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:18px;
    padding:14px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
  .move{margin-top:16px}
  .chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:9px}
  .chip{font-size:12.5px;padding:7px 13px;border-radius:9px;background:var(--surface-2);border:1px solid var(--border);transition:.15s}
  .chip:hover:not(:disabled){background:var(--surface-3)} .chip.on{background:var(--accent);color:#fff;border-color:transparent}
  .chip:disabled{opacity:.4;cursor:not-allowed}
  .detail-actions{display:flex;gap:10px;margin-top:20px}
  .detail-actions .primary{flex:1}

  /* canvas */
  .canvas{display:flex;flex-direction:column;height:100%}
  .canvas-head{display:flex;align-items:center;gap:16px;padding-bottom:16px;border-bottom:1px solid var(--border);flex-wrap:wrap}
  .canvas-title{display:flex;align-items:center;gap:12px;flex:1;min-width:200px}
  .canvas-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:18px;flex:1;min-height:0}
  .canvas-grid section{display:flex;flex-direction:column;background:var(--surface-2);border:1px solid var(--border);border-radius:16px;padding:16px}
  .canvas-grid h3{margin:0 0 12px;font-size:13.5px;font-weight:600;line-height:1.35}
  .canvas-grid textarea{flex:1;width:100%;background:none;border:none;outline:none;resize:none;font-size:14px;line-height:1.6;color:var(--text)}
  .canvas-grid textarea::placeholder{color:var(--faint)}

  /* settings */
  .set-row{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-top:18px;font-size:14px}
  .seg{display:flex;background:var(--surface-2);border-radius:10px;padding:3px}
  .seg button{padding:7px 16px;border-radius:8px;font-size:13px;font-weight:500;color:var(--muted)}
  .seg button.on{background:var(--accent);color:#fff}
  .cool input{width:80px} .settings hr{border:none;border-top:1px solid var(--border);margin:20px 0}

  /* toast */
  .toast{position:fixed;bottom:26px;left:50%;z-index:200;
    background:var(--surface);border:1px solid var(--border-2);box-shadow:var(--shadow);
    padding:12px 20px;border-radius:14px;font-size:13.5px;font-weight:500;opacity:0;
    transition:opacity .2s,transform .25s;transform:translateX(-50%) translateY(20px)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* lock screen */
  .lock-screen{position:fixed;inset:0;z-index:300;display:flex;align-items:center;justify-content:center;
    padding:24px;background:radial-gradient(120% 100% at 50% 0%, var(--bg-2), var(--bg))}
  .lock-card{width:100%;max-width:320px;text-align:center}
  .lock-card h1{margin:14px 0 4px;font-size:24px}
  .lock-logo{display:flex;justify-content:center}
  .lock-card form{margin-top:18px;display:flex;flex-direction:column;gap:12px}
  .lock-card input[type=password]{background:var(--surface-2);border:1px solid var(--border);border-radius:12px;
    padding:13px 15px;font-size:16px;outline:none;text-align:center;color:var(--text);width:100%}
  .lock-card input[type=password]:focus{border-color:var(--accent);box-shadow:0 0 0 4px var(--accent-soft)}
  .lock-card .primary{padding:13px;border-radius:12px;width:100%}
  .lock-err{color:var(--bad);font-size:12.5px;min-height:16px;margin:2px 0 0}
  .link-btn{margin-top:14px;color:var(--muted);font-size:12.5px;text-decoration:underline;background:none}
  .ack{display:flex;gap:8px;align-items:flex-start;margin-top:12px;font-size:12px;color:var(--muted);text-align:left;cursor:pointer}
  .ack input{width:auto;margin-top:1px;flex:none}
  /* backup banner */
  .banner{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);z-index:120;
    display:flex;align-items:center;gap:14px;flex-wrap:wrap;justify-content:center;
    max-width:calc(100vw - 32px);padding:12px 16px;background:var(--surface);
    border:1px solid var(--border-2);border-radius:14px;box-shadow:var(--shadow);font-size:13px}
  .banner-actions{display:flex;gap:8px}
  .sm{padding:7px 13px;font-size:12.5px;border-radius:9px}

  body.dragging-active{user-select:none;cursor:grabbing}
  body.dragging-active .card:not(.dragging){pointer-events:none}

  /* responsive */
  @media(max-width:640px){
    header.top{padding:12px 14px;gap:10px;flex-wrap:wrap}
    .search{order:3;flex:1 1 100%;min-width:0}
    .new-btn span{display:none} .new-btn kbd{display:none}
    .board{padding:16px 14px;gap:12px}
    .col,.col-body{scroll-snap-align:start}
    .canvas-grid{grid-template-columns:1fr;overflow:auto}
    .modal.full{height:94vh}
  }
</style>
</head>
<body>
  <header class="top">
    <div class="brand">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
        <path d="M3 4.5h18l-7 8.5v6l-4 2v-8L3 4.5Z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/>
        <circle cx="12" cy="6" r="0" />
      </svg>
      <span>Wip<span class="dot">idea</span></span>
    </div>
    <div class="spacer"></div>
    <div class="search">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/><path d="m20 20-3-3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      <input id="search" placeholder="Buscar ideias…  ( / )" autocomplete="off"/>
    </div>
    <button class="icon-btn" id="themeBtn" title="Alternar tema">
      <svg id="themeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none"></svg>
    </button>
    <button class="icon-btn" id="settingsBtn" title="Configurações">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z" stroke="currentColor" stroke-width="1.7"/><path d="M19.4 13a1.6 1.6 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.6 1.6 0 0 0-2.7 1.1V21a2 2 0 1 1-4 0v-.1A1.6 1.6 0 0 0 7 19.4a1.6 1.6 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.6 1.6 0 0 0-1.1-2.7H1a2 2 0 1 1 0-4h.1A1.6 1.6 0 0 0 2.6 7a1.6 1.6 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1A1.6 1.6 0 0 0 7 2.6h.1A1.6 1.6 0 0 0 8.8 1.1V1a2 2 0 1 1 4 0v.1A1.6 1.6 0 0 0 15.5 2.6a1.6 1.6 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.6 1.6 0 0 0-.4 1.8V7a1.6 1.6 0 0 0 1.5 1h.1a2 2 0 1 1 0 4h-.1a1.6 1.6 0 0 0-1.4 1Z" stroke="currentColor" stroke-width="1.4"/></svg>
    </button>
    <button class="new-btn" id="newBtn"><span>Nova ideia</span> <kbd>N</kbd></button>
  </header>

  <div class="board-wrap"><div class="board" id="board"></div></div>
  <div id="modalRoot"></div>

<script>
(function(){
  "use strict";
  /* ===================== Estado ===================== */
  const KEY = "ideafunnel.v1";
  const STAGES = [
    {id:"quarantine", name:"Quarentena", sub:"Resfriamento"},
    {id:"evaluation", name:"Em Avaliação", sub:"A Matriz"},
    {id:"execute",    name:"Executar",    sub:"Foco / MVP"},
    {id:"incubate",   name:"Incubar",     sub:"Futuro"},
    {id:"archived",   name:"Arquivadas",  sub:"Histórico"},
  ];
  const stageName = id => (STAGES.find(s=>s.id===id)||{}).name || id;

  const LOGO_SVG = '<svg width="36" height="36" viewBox="0 0 24 24" fill="none"><path d="M3 4.5h18l-7 8.5v6l-4 2v-8L3 4.5Z" stroke="#0a84ff" stroke-width="1.6" stroke-linejoin="round"/></svg>';

  let state = null;
  let query = "";

  /* Persistência: texto puro por padrão; AES-GCM (Web Crypto) quando o cadeado está ativo. */
  const SKEY = "wipidea.secure";
  const ITER = 250000;
  const _enc = new TextEncoder(), _dec = new TextDecoder();
  let cryptoKey = null, secSalt = null, lockEnabled = false;
  const cryptoOK = !!(window.crypto && window.crypto.subtle && window.isSecureContext);
  const _b64 = buf => btoa(String.fromCharCode.apply(null, new Uint8Array(buf)));
  const _unb64 = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));

  function defaultState(){ return { ideas:[], theme:"dark", coolingHours:48, seeded:false, lastExportAt:0, remindSnoozeAt:0 }; }
  function load(){ try{ return JSON.parse(localStorage.getItem(KEY)); }catch(e){ return null; } }
  function save(){
    if(lockEnabled && cryptoKey){ persistSecure().catch(function(){}); }
    else { try{ localStorage.setItem(KEY, JSON.stringify(state)); }catch(e){} }
  }
  async function deriveKey(pass, salt){
    const base = await crypto.subtle.importKey("raw", _enc.encode(pass), "PBKDF2", false, ["deriveKey"]);
    return crypto.subtle.deriveKey({ name:"PBKDF2", salt:salt, iterations:ITER, hash:"SHA-256" }, base, { name:"AES-GCM", length:256 }, false, ["encrypt","decrypt"]);
  }
  async function persistSecure(){
    const iv = crypto.getRandomValues(new Uint8Array(12));
    const ct = await crypto.subtle.encrypt({ name:"AES-GCM", iv:iv }, cryptoKey, _enc.encode(JSON.stringify(state)));
    localStorage.setItem(SKEY, JSON.stringify({ v:1, salt:_b64(secSalt), iv:_b64(iv), ct:_b64(ct) }));
  }
  async function enableLock(pass){
    secSalt = crypto.getRandomValues(new Uint8Array(16));
    cryptoKey = await deriveKey(pass, secSalt);
    lockEnabled = true;
    await persistSecure();
    localStorage.removeItem(KEY);
  }
  async function changePass(pass){
    secSalt = crypto.getRandomValues(new Uint8Array(16));
    cryptoKey = await deriveKey(pass, secSalt);
    await persistSecure();
  }
  function disableLock(){
    lockEnabled = false; cryptoKey = null; secSalt = null;
    localStorage.removeItem(SKEY);
    save();
  }
  function lockNow(){
    if(!lockEnabled) return;
    cryptoKey = null; state = null;
    document.getElementById("modalRoot").innerHTML = "";
    board.innerHTML = "";
    showLock();
  }

  /* ===================== Helpers ===================== */
  const $ = s => document.querySelector(s);
  const board = $("#board");
  const now = () => Date.now();
  const uid = () => Math.random().toString(36).slice(2,9)+now().toString(36);
  const byId = id => state.ideas.find(i=>i.id===id);
  const esc = s => (s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
  const debounce=(fn,ms)=>{let h;return(...a)=>{clearTimeout(h);h=setTimeout(()=>fn(...a),ms);};};

  function timeAgo(ts){
    const s=Math.floor((now()-ts)/1000);
    if(s<60) return "agora mesmo";
    const m=Math.floor(s/60); if(m<60) return "há "+m+" min";
    const h=Math.floor(m/60); if(h<24) return "há "+h+(h>1?" horas":" hora");
    const d=Math.floor(h/24); return "há "+d+(d>1?" dias":" dia");
  }
  function timeUntil(ts){
    const s=Math.floor((ts-now())/1000); if(s<=0) return null;
    const h=Math.floor(s/3600), m=Math.floor((s%3600)/60);
    return h>=1 ? h+"h "+m+"min" : m+"min";
  }
  function lockInfo(idea){
    const span = state.coolingHours*3600*1000;
    const until = idea.createdAt + span;
    const locked = idea.stage==="quarantine" && span>0 && now()<until;
    const progress = span<=0 ? 1 : Math.max(0,Math.min(1,(now()-idea.createdAt)/span));
    return {until, locked, progress, remaining:timeUntil(until)};
  }
  // Score = média geométrica dos 3 fatores (1..5). Pune o elo mais fraco.
  function computeScore(s){ return s ? Math.cbrt(s.alignment*s.viability*s.impact) : null; }
  function scoreTier(v){
    if(v==null) return null;
    if(v>=3.75) return {label:"Prioridade alta", cls:"high"};
    if(v>=2.5)  return {label:"Média",           cls:"mid"};
    return {label:"Repensar", cls:"low"};
  }

  /* ===================== Render ===================== */
  function matches(idea){
    if(!query) return true;
    const t=(idea.title+" "+idea.description+" "+idea.problem+" "+idea.audience).toLowerCase();
    return t.includes(query);
  }

  function renderBoard(){
    board.innerHTML="";
    for(const st of STAGES){
      const col=document.createElement("section"); col.className="col"; col.dataset.stage=st.id;
      const items=state.ideas.filter(i=>i.stage===st.id && matches(i));
      const head=document.createElement("div"); head.className="col-head";
      head.innerHTML=`<h2>${st.name}</h2><span class="sub">${st.sub}</span><span class="count">${items.length}</span>`;
      const body=document.createElement("div"); body.className="col-body"; body.dataset.stage=st.id;
      if(items.length===0){
        const e=document.createElement("div"); e.className="empty"; e.textContent=emptyText(st.id); body.appendChild(e);
      } else for(const idea of items) body.appendChild(renderCard(idea));
      col.appendChild(head); col.appendChild(body); board.appendChild(col);
    }
  }
  function emptyText(id){
    return ({quarantine:"Capture uma ideia (tecla N) — ela esfria aqui antes de avançar.",
      evaluation:"Arraste uma ideia para cá para pontuá-la.",
      execute:"Suas ideias prioritárias para construir um MVP.",
      incubate:"Boas ideias, mas sem timing agora.",
      archived:"Ideias descartadas ficam no histórico."}[id])||"Vazio.";
  }

  function renderCard(idea){
    const el=document.createElement("article"); el.className="card"; el.dataset.id=idea.id;
    const sc=computeScore(idea.scores), tier=scoreTier(sc), li=lockInfo(idea);
    if(li.locked) el.classList.add("locked");
    const scoreBadge = sc!=null ? `<span class="score ${tier.cls}">${sc.toFixed(1)}</span>` : "";
    let foot=`<div class="card-foot"><span class="meta-time">Criado ${timeAgo(idea.createdAt)}</span>`+
             (idea.stage==="execute"?`<button class="chip-mini">Canvas ↗</button>`:"")+`</div>`;
    let lock="";
    if(idea.stage==="quarantine"){
      if(li.locked){
        const off=(50.27*(1-li.progress)).toFixed(2);
        lock=`<div class="lock-wrap">
          <svg class="ring" width="24" height="24" viewBox="0 0 24 24"><circle class="ring-bg" cx="12" cy="12" r="8"/><circle class="ring-fg" cx="12" cy="12" r="8" style="stroke-dashoffset:${off}"/></svg>
          <div class="lock-txt"><b>🔒 Em resfriamento</b><span class="lock-remain">Desbloqueia em ${li.remaining}</span></div></div>`;
      } else {
        lock=`<div class="ready">✓ Resfriou — pronta para avançar</div>`;
      }
    }
    el.innerHTML=`<div class="card-top"><h3>${esc(idea.title)}</h3>${scoreBadge}</div>`+
      (idea.description?`<p class="desc">${esc(idea.description)}</p>`:"")+foot+lock;
    return el;
  }

  /* ===================== Drag & Drop (pointer-based + FLIP) ===================== */
  let drag=null;
  board.addEventListener("pointerdown", e=>{
    if(e.button!==0) return;
    const card=e.target.closest(".card"); if(!card) return;
    if(e.target.closest("button,a,input,textarea")) return;
    drag={ id:card.dataset.id, card, sx:e.clientX, sy:e.clientY, started:false, blocked:false,
           locked:lockInfo(byId(card.dataset.id)).locked, pid:e.pointerId };
    window.addEventListener("pointermove", onMove);
    window.addEventListener("pointerup", onUp, {once:true});
  });

  function onMove(e){
    if(!drag) return;
    const dx=e.clientX-drag.sx, dy=e.clientY-drag.sy;
    if(!drag.started){
      if(Math.hypot(dx,dy)<6) return;
      if(drag.locked){ drag.blocked=true; return; }
      startDrag(e);
    }
    if(drag.started){ e.preventDefault(); positionCard(e); hitTest(e); }
  }
  function startDrag(e){
    drag.started=true;
    const c=drag.card, r=c.getBoundingClientRect();
    drag.offX=e.clientX-r.left; drag.offY=e.clientY-r.top;
    const ph=document.createElement("div"); ph.className="placeholder"; ph.style.height=r.height+"px";
    c.parentNode.insertBefore(ph, c.nextSibling); drag.ph=ph;
    c.style.position="fixed"; c.style.left="0"; c.style.top="0";
    c.style.width=r.width+"px"; c.style.height=r.height+"px"; c.style.margin="0";
    c.style.pointerEvents="none"; c.classList.add("dragging");
    document.body.classList.add("dragging-active");
    positionCard(e);
  }
  function positionCard(e){
    const x=e.clientX-drag.offX, y=e.clientY-drag.offY;
    drag.card.style.transform=`translate(${x}px,${y}px) scale(1.03) rotate(1.4deg)`;
  }
  function hitTest(e){
    const el=document.elementFromPoint(e.clientX,e.clientY);
    const body=el && el.closest(".col-body"); if(!body) return;
    document.querySelectorAll(".col-body.drop-hot").forEach(b=>b.classList.remove("drop-hot"));
    body.classList.add("drop-hot");
    const cards=[...body.querySelectorAll(".card")].filter(c=>c!==drag.card);
    let before=null;
    for(const c of cards){ const cr=c.getBoundingClientRect(); if(e.clientY < cr.top+cr.height/2){ before=c; break; } }
    if(drag.ph.parentNode===body && drag.ph.nextSibling===before) return;
    const set=new Set([drag.ph.parentNode, body]);
    flip([...set], ()=>{ const em=body.querySelector(".empty"); if(em) em.remove(); body.insertBefore(drag.ph, before); });
  }
  function flip(containers, mutate){
    const els=[]; containers.forEach(ct=>els.push(...ct.children));
    const first=new Map(els.map(el=>[el,el.getBoundingClientRect()]));
    mutate();
    els.forEach(el=>{
      if(el===drag.card || !el.isConnected) return;
      const f=first.get(el); if(!f) return;
      const l=el.getBoundingClientRect(); const dx=f.left-l.left, dy=f.top-l.top;
      if(dx||dy){
        el.style.transition="none"; el.style.transform=`translate(${dx}px,${dy}px)`;
        el.getBoundingClientRect();
        requestAnimationFrame(()=>{ el.style.transition="transform .2s cubic-bezier(.2,.8,.2,1)"; el.style.transform=""; });
      }
    });
  }
  function onUp(){
    window.removeEventListener("pointermove", onMove);
    if(drag && drag.started) drop();
    else if(drag){ const id=drag.id; drag=null; openDetail(id); return; }
    drag=null;
  }
  function drop(){
    const c=drag.card, ph=drag.ph, body=ph.parentNode, newStage=body.dataset.stage, idea=byId(drag.id);
    const pr=ph.getBoundingClientRect();
    c.style.transition="transform .22s cubic-bezier(.2,.85,.3,1)";
    c.style.transform=`translate(${pr.left}px,${pr.top}px) scale(1) rotate(0deg)`;
    let done=false;
    const finish=()=>{ if(done) return; done=true; commit(idea, newStage, body, ph, c); };
    c.addEventListener("transitionend", finish, {once:true});
    setTimeout(finish, 300);
  }
  function commit(idea, newStage, body, ph, card){
    // ordem dentro da coluna conforme DOM (placeholder = posição do card movido).
    // 'card' é passado explicitamente: aqui 'drag' já foi zerado (commit roda após a animação).
    const idsInCol=[];
    for(const ch of body.children){
      if(ch===ph) idsInCol.push(idea.id);
      else if(ch.classList.contains("card") && ch!==card) idsInCol.push(ch.dataset.id);
    }
    idea.stage=newStage;
    let arr=state.ideas.filter(i=>i.id!==idea.id);
    const target=idsInCol.map(id=> id===idea.id?idea:arr.find(i=>i.id===id)).filter(Boolean);
    arr=arr.filter(i=>i.stage!==newStage);
    state.ideas=arr.concat(target);
    save();
    document.body.classList.remove("dragging-active");
    document.querySelectorAll(".col-body.drop-hot").forEach(b=>b.classList.remove("drop-hot"));
    renderBoard();
    if(newStage==="evaluation" && !idea.scores) openScore(idea.id);
  }

  // clique no botão "Canvas ↗"
  board.addEventListener("click", e=>{
    if(e.target.closest(".chip-mini")){ const card=e.target.closest(".card"); if(card) openCanvas(card.dataset.id); }
  });

  /* ===================== Modais ===================== */
  function modal(html, opts={}){
    const root=$("#modalRoot");
    const ov=document.createElement("div"); ov.className="overlay";
    ov.innerHTML=`<div class="modal ${opts.size==="full"?"full":""}">${html}</div>`;
    root.appendChild(ov);
    requestAnimationFrame(()=>ov.classList.add("show"));
    ov.addEventListener("pointerdown", e=>{ if(e.target===ov) closeTop(); });
    ov.querySelectorAll("[data-close]").forEach(b=>b.addEventListener("click", closeTop));
    return ov;
  }
  function closeTop(){
    const root=$("#modalRoot"), ov=root.lastElementChild; if(!ov) return;
    ov.classList.remove("show"); setTimeout(()=>ov.remove(),180);
  }
  const modalOpen=()=>$("#modalRoot").children.length>0;

  function openCapture(){

  function openDetail(id){
    const idea=byId(id); if(!idea) return;
    const sc=computeScore(idea.scores), tier=scoreTier(sc), li=lockInfo(idea);
    const ov=modal(`<div class="detail">
      <div class="modal-head"><span class="stage-tag">${stageName(idea.stage)}</span><button class="icon" data-close>✕</button></div>

      <div class="score-row">
        ${sc!=null?`<div class="score-big ${tier.cls}"><strong>${sc.toFixed(1)}</strong><span>/5 · ${tier.label}</span></div>`

        ${li.locked?`<p class="muted xsmall" style="margin-top:9px">🔒 Em quarentena por mais ${li.remaining}. Avançar libera depois do resfriamento — evita decisões no impulso.</p>`:""}
      </div>

    ov.querySelectorAll("[data-f]").forEach(el=>el.addEventListener("input", debounce(()=>{ idea[el.dataset.f]=el.value; save(); renderBoard(); },250)));

  function openScore(id){
    const idea=byId(id); if(!idea) return;
    const s=idea.scores?{...idea.scores}:{alignment:3,viability:3,impact:3};
    const crit=[
      ["alignment","Alinhamento estratégico","O quanto te aproxima das suas metas de longo prazo?"],
      ["viability","Viabilidade / Tempo","Dá pra testar em menos de 30 dias com o que você já tem?"],
      ["impact","Impacto / Retorno","Resolve uma dor real pela qual as pessoas pagariam?"],
    ];
    const ov=modal(`<div class="score-modal">
      <div class="modal-head"><h2>Avaliar ideia</h2><button class="icon" data-close>✕</button></div>
      <p class="muted small" style="margin:0 0 4px">${esc(idea.title)}</p>
      ${crit.map(([k,t,h])=>`<div class="crit">
        <div class="crit-top"><span>${t}</span><b class="val" data-v="${k}">${s[k]}</b></div>
        <input type="range" min="1" max="5" step="1" value="${s[k]}" data-k="${k}"/>

      <div class="score-preview"><span>Score de prioridade</span><div class="score-big" id="scorePrev"></div></div>
      <p class="muted xsmall" style="margin-top:10px">Média geométrica dos três fatores. Uma nota baixa em <em>qualquer</em> dimensão derruba o score — evita avançar ideias desequilibradas.</p>
      <div class="row end"><button class="ghost" data-close>Cancelar</button><button class="primary" data-act="save">Salvar avaliação</button></div>
    </div>`);
    const cur={...s};
    function refresh(){
      const v=Math.cbrt(cur.alignment*cur.viability*cur.impact), tier=scoreTier(v), box=ov.querySelector("#scorePrev");

    refresh();
    ov.querySelector('[data-act="save"]').addEventListener("click",()=>{
      idea.scores={...cur}; if(idea.stage==="quarantine") idea.stage="evaluation"; save(); closeTop(); renderBoard(); toast("Avaliação salva ✓");
    });
  }

  function openSettings(){

  }

  function openLockSetup(mode){
    const ov=modal('<div>'
      + '<div class="modal-head"><h2>'+(mode==="enable"?"Ativar cadeado":"Trocar senha")+'</h2><button class="icon" data-close>✕</button></div>'
      + (mode==="enable"
          ? '<p class="small">Sua senha criptografa as ideias <b>neste aparelho</b> e não vai para lugar nenhum. Por isso, se você esquecer, <b>não há como recuperar</b> os dados (a menos que tenha um backup exportado).</p>'
          : '<p class="small">Defina a nova senha. Os dados serão recriptografados.</p>')
      + '<form id="lockSetup" autocomplete="off">'
      + '<input type="password" id="np1" placeholder="'+(mode==="enable"?"Crie uma senha":"Nova senha")+'" autocomplete="new-password"/>'
      + '<input type="password" id="np2" placeholder="Repita a senha" autocomplete="new-password" style="margin-top:10px"/>'
      + (mode==="enable" ? '<label class="ack"><input type="checkbox" id="ackChk"/> <span>Entendo que, sem a senha, os dados não podem ser recuperados.</span></label>' : '')
      + '<p class="lock-err" id="setErr"></p>'
      + '<div class="row end"><button type="button" class="ghost" data-close>Cancelar</button><button class="primary" type="submit">'+(mode==="enable"?"Ativar cadeado":"Salvar")+'</button></div>'
      + '</form></div>');
    const f=ov.querySelector("#lockSetup"), err=ov.querySelector("#setErr");
    ov.querySelector("#np1").focus();
    f.addEventListener("submit", async e=>{
      e.preventDefault(); err.textContent="";
      const p1=ov.querySelector("#np1").value, p2=ov.querySelector("#np2").value, ack=ov.querySelector("#ackChk");
      if(p1.length<4){ err.textContent="Use ao menos 4 caracteres."; return; }
      if(p1!==p2){ err.textContent="As senhas não coincidem."; return; }
      if(mode==="enable" && ack && !ack.checked){ err.textContent="Confirme que entendeu o aviso."; return; }
      const btn=f.querySelector("button[type=submit]"); btn.disabled=true; btn.textContent="Processando…";
      try{
        if(mode==="enable"){ await enableLock(p1); } else { await changePass(p1); }
        closeTop(); toast(mode==="enable"?"Cadeado ativado 🔒":"Senha atualizada");
      }catch(e2){ err.textContent="Erro ao processar. Tente de novo."; btn.disabled=false; btn.textContent=(mode==="enable"?"Ativar cadeado":"Salvar"); }
    });
  }

  /* ===================== Tema, backup, toast ===================== */
  const sun=`<circle cx="12" cy="12" r="4.5" stroke="currentColor" stroke-width="1.7"/><path d="M12 2v2M12 20v2M4 12H2M22 12h-2M5 5l1.5 1.5M17.5 17.5 19 19M19 5l-1.5 1.5M6.5 17.5 5 19" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>`;
  const moon=`<path d="M21 12.8A8.5 8.5 0 1 1 11.2 3a6.6 6.6 0 0 0 9.8 9.8Z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/>`;
  function setTheme(t){ state.theme=t; save(); document.documentElement.dataset.theme=t; $("#themeIcon").innerHTML = t==="dark"?moon:sun;
    const mt=document.querySelector('meta[name=theme-color]'); if(mt) mt.setAttribute("content", t==="dark"?"#000000":"#f2f2f7"); }

  function exportData(){
    state.lastExportAt = now(); save();
    const bn=document.getElementById("backupBanner"); if(bn) bn.remove();
    const blob=new Blob([JSON.stringify(state,null,2)],{type:"application/json"});
    const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
    a.download="wipidea-backup-"+new Date().toISOString().slice(0,10)+".json"; a.click();
    setTimeout(()=>URL.revokeObjectURL(a.href),1000);
  }
  function importData(){
    const inp=document.createElement("input"); inp.type="file"; inp.accept="application/json";
    inp.onchange=()=>{ const f=inp.files[0]; if(!f) return; const rd=new FileReader();
      rd.onload=()=>{ try{ const d=JSON.parse(rd.result);
        if(!d||!Array.isArray(d.ideas)) throw 0;
        state=Object.assign(defaultState(), d); save(); setTheme(state.theme); closeTop(); renderBoard(); toast("Backup importado ✓");
      }catch{ alert("Arquivo inválido."); } };
      rd.readAsText(f); };
    inp.click();
  }
  function toast(msg){
    const t=document.createElement("div"); t.className="toast"; t.textContent=msg; document.body.appendChild(t);
    requestAnimationFrame(()=>t.classList.add("show"));
    setTimeout(()=>{ t.classList.remove("show"); setTimeout(()=>t.remove(),250); },2200);
  }

  /* ===================== Seed inicial (demonstração) ===================== */
  function seed(){
    if(state.seeded) return;
    const h=3600*1000;
    state.ideas=[
      { id:uid(), title:"App de mentoria entre pares (15 min)", description:"Conectar profissionais para microtrocas rápidas e baratas.", problem:"Mentoria boa é cara, lenta e difícil de acessar.", audience:"Profissionais em início de carreira", createdAt:now()-3*h, stage:"quarantine", scores:null, canvas:{pain:"",test:"",metrics:""} },
      { id:uid(), title:"Newsletter curada de IA para PMEs", description:"Resumo semanal só com o que dá para aplicar na prática.", problem:"Excesso de conteúdo de IA, quase nada aplicável.", audience:"Donos de pequenos negócios", createdAt:now()-60*h, stage:"execute", scores:{alignment:4,viability:5,impact:4}, canvas:{pain:"",test:"",metrics:""} },
    ];
    state.seeded=true; save();
  }

  /* ===================== Bind global ===================== */
  $("#newBtn").addEventListener("click", openCapture);
  $("#settingsBtn").addEventListener("click", openSettings);
  $("#themeBtn").addEventListener("click", ()=>setTheme(state.theme==="dark"?"light":"dark"));
  $("#search").addEventListener("input", e=>{ query=e.target.value.toLowerCase(); renderBoard(); });

  document.addEventListener("keydown", e=>{
    if(document.getElementById("lockScreen")) return;
    if(e.key==="Escape"){ if(modalOpen()) closeTop(); return; }
    const tag=(e.target.tagName||"").toLowerCase();
    if(tag==="input"||tag==="textarea"||e.target.isContentEditable) return;
    if(!state) return;
    if(e.key==="n"||e.key==="N"){ if(!modalOpen()){ e.preventDefault(); openCapture(); } }
    if(e.key==="/"){ e.preventDefault(); $("#search").focus(); }
  });

  // atualiza contadores de tempo / desbloqueio periodicamente
  setInterval(()=>{ if(!drag && !modalOpen() && state) renderBoard(); }, 60000);

  /* ===================== Cadeado (tela de bloqueio) ===================== */
  function showLock(opts){
    opts = opts || {};
    removeLock();
    const ov = document.createElement("div"); ov.className="lock-screen"; ov.id="lockScreen";
    if(opts.insecure){
      ov.innerHTML = '<div class="lock-card"><div class="lock-logo">'+LOGO_SVG+'</div><h1>Wipidea</h1>'
        + '<p class="muted small">Seus dados estão criptografados. Abra o app pelo endereço seguro (https) para desbloquear.</p></div>';
      document.body.appendChild(ov); return;
    }
    ov.innerHTML = '<div class="lock-card"><div class="lock-logo">'+LOGO_SVG+'</div><h1>Wipidea</h1>'
      + '<p class="muted small">Digite sua senha para desbloquear</p>'
      + '<form id="lockForm" autocomplete="off">'
      + '<input type="password" id="lockPass" placeholder="Senha" autocomplete="current-password"/>'
      + '<button class="primary" type="submit">Desbloquear</button>'
      + '<p class="lock-err" id="lockErr"></p></form>'
      + '<button class="link-btn" id="lockForgot">Esqueci minha senha</button></div>';
    document.body.appendChild(ov);
    const f=ov.querySelector("#lockForm"), pass=ov.querySelector("#lockPass"), err=ov.querySelector("#lockErr");
    pass.focus();
    f.addEventListener("submit", async e=>{
      e.preventDefault(); err.textContent="";
      const btn=f.querySelector("button"); btn.disabled=true; btn.textContent="Desbloqueando…";
      await tryUnlock(pass.value, err);
      if(document.getElementById("lockScreen")){ btn.disabled=false; btn.textContent="Desbloquear"; pass.focus(); pass.select(); }
    });
    ov.querySelector("#lockForgot").addEventListener("click", forgotPass);
  }
  function removeLock(){ const e=document.getElementById("lockScreen"); if(e) e.remove(); }
  async function tryUnlock(pass, errEl){
    let rec; try{ rec = JSON.parse(localStorage.getItem(SKEY)); }catch(e){ errEl.textContent="Dados corrompidos."; return; }
    try{
      const salt=_unb64(rec.salt);
      const key=await deriveKey(pass, salt);
      const pt=await crypto.subtle.decrypt({ name:"AES-GCM", iv:_unb64(rec.iv) }, key, _unb64(rec.ct));
      state=JSON.parse(_dec.decode(pt));
      cryptoKey=key; secSalt=salt; lockEnabled=true;
      removeLock(); finishBoot();
    }catch(e){ errEl.textContent="Senha incorreta. Tente de novo."; }
  }
  function forgotPass(){
    const ov=modal('<div><div class="modal-head"><h2>Esqueci a senha</h2><button class="icon" data-close>✕</button></div>'
      + '<p class="small">Por segurança, os dados são criptografados e <b>não podem ser recuperados sem a senha</b> — nem por mim, nem pelo navegador.</p>'
      + '<p class="small">Se você tem um arquivo de <b>backup</b> exportado antes, dá para recomeçar e importá-lo. Isso apaga os dados bloqueados atuais.</p>'
      + '<div class="row end"><button class="ghost" data-close>Voltar</button><button class="ghost danger" data-act="reset">Apagar e recomeçar</button></div></div>');
    ov.querySelector('[data-act="reset"]').addEventListener("click", ()=>{
      if(confirm("Apagar os dados bloqueados e recomeçar? Isto não pode ser desfeito.")){
        localStorage.removeItem(SKEY); localStorage.removeItem(KEY); location.reload();
      }
    });
  }

  /* ===================== Lembrete de backup ===================== */
  function maybeBackupReminder(){
    const WEEK=7*24*3600*1000, DAY=24*3600*1000;
    if(!state.ideas.length) return;
    const sinceExport = now() - (state.lastExportAt || 0);
    const snoozedRecently = now() - (state.remindSnoozeAt || 0) < DAY;
    if(sinceExport > WEEK && !snoozedRecently) showBackupBanner();
  }
  function showBackupBanner(){
    if(document.getElementById("backupBanner")) return;
    const b=document.createElement("div"); b.className="banner"; b.id="backupBanner";
    b.innerHTML = '<span>🛟 Faça um backup das suas ideias — elas ficam só neste aparelho.</span>'
      + '<span class="banner-actions"><button class="primary sm" data-b="exp">Exportar backup</button><button class="ghost sm" data-b="later">Depois</button></span>';
    document.body.appendChild(b);
    b.querySelector('[data-b="exp"]').addEventListener("click", ()=>{ exportData(); });
    b.querySelector('[data-b="later"]').addEventListener("click", ()=>{ state.remindSnoozeAt=now(); save(); b.remove(); });
  }

  /* ===================== Boot ===================== */
  function finishBoot(){
    state = Object.assign(defaultState(), state || {});
    if(!state.lastExportAt){ state.lastExportAt = now(); }
    seed();
    setTheme(state.theme || "dark");
    renderBoard();
    save();
    maybeBackupReminder();
  }
  function boot(){
    if(localStorage.getItem(SKEY)){
      lockEnabled = true;
      showLock(cryptoOK ? {} : { insecure:true });
      return;
    }
    state = load() || defaultState();
    finishBoot();
  }
  boot();
})();
</script>
<script>
  /* PWA: registra o service worker (só ativa via http/https — no GitHub Pages funciona) */
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", function(){
      navigator.serviceWorker.register("sw.js").catch(function(){});
    });
  }
</script>
